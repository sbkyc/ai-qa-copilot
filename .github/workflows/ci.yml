name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m playwright install --with-deps chromium

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest -q --browser chromium --tracing retain-on-failure --screenshot only-on-failure

      - name: Generate AI diagnosis
        if: always()
        run: python -m qa_copilot.cli --input reports/latest/failures --output reports/latest/ai-diagnosis.md

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: reports/
