<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>AI QA Demo Shop</title>
  </head>
  <body>
    <main>
      <h1>AI QA Demo Shop</h1>
      <form method="post" action="/login">
        <label>
          Username
          <input name="username" value="alice">
        </label>
        <label>
          Password
          <input name="password" type="password" value="password123">
        </label>
        <button type="submit">Sign in</button>
      </form>
      {% if error %}
        <p role="alert">{{ error }}</p>
      {% endif %}
    </main>
  </body>
</html>
