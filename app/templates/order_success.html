<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Created</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">AI QA Copilot</a>
      <span class="topbar-meta">Signed in as {{ username }}</span>
    </header>
    <main class="page-shell">
      <section class="panel result-panel">
        <h1>Order Created</h1>
        <p>{{ username }} ordered {{ order.quantity }} x {{ order.product_name }}.</p>
        <p>Status: <strong>{{ order.status }}</strong></p>
        <a class="button-link" href="/products">Back to products</a>
      </section>
    </main>
  </body>
</html>
