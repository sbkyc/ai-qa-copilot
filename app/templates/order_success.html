<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>订单创建成功</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">AI QA Copilot</a>
      <nav class="topbar-nav" aria-label="主导航">
        <a href="/">Dashboard</a>
        <a href="/login">Demo Shop</a>
        <a href="/docs">API Docs</a>
      </nav>
      <span class="topbar-meta">当前用户：{{ username }}</span>
    </header>
    <main class="page-shell">
      <section class="panel result-panel">
        <h1>订单创建成功</h1>
        <p>{{ username }} 已购买 {{ order.quantity }} 件 {{ order.product_name }}。</p>
        <p>状态：<strong>{{ '已创建' if order.status == 'created' else order.status }}</strong></p>
        <a class="button-link" href="/products">返回商品列表</a>
      </section>
    </main>
  </body>
</html>
