<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">AI QA Copilot</a>
      <span class="topbar-meta">Signed in as {{ username }}</span>
    </header>
    <main class="page-shell">
      <section class="page-heading">
        <h1>Products</h1>
        <p>Choose an item and create an order to exercise the E2E flow.</p>
      </section>
      {% if error %}
        <p role="alert" class="alert">{{ error }}</p>
      {% endif %}
      <section class="product-grid" aria-label="Product catalog">
        {% for product in products %}
          <article class="product-card">
            <h2>{{ product.name }}</h2>
            <dl class="product-meta">
              <div>
                <dt>Price</dt>
                <dd>{{ product.price_cents }} cents</dd>
              </div>
              <div>
                <dt>Stock</dt>
                <dd>{{ product.stock }}</dd>
              </div>
            </dl>
            <form method="post" action="/orders">
              <input type="hidden" name="product_id" value="{{ product.id }}">
              <label>
                Quantity
                <input name="quantity" type="number" value="1" min="1">
              </label>
              <button type="submit">Create order</button>
            </form>
          </article>
        {% endfor %}
      </section>
    </main>
  </body>
</html>
